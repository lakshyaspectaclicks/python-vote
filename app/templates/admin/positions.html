{% extends "base.html" %}
{% block title %}Positions{% endblock %}
{% block content %}
<section class="card">
  <div class="card-head">
    <h1>Positions · {{ election.name }}</h1>
    <a class="btn btn-small" href="{{ url_for('admin.elections') }}">Back</a>
  </div>
  <form method="post" class="inline-grid">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input name="name" type="text" placeholder="Position name" required>
    <input name="display_order" type="number" min="1" value="1" required>
    <button type="submit" class="btn">Add Position</button>
  </form>
  <table>
    <thead><tr><th>Order</th><th>Name</th><th>Actions</th></tr></thead>
    <tbody>
    {% for position in positions %}
      <tr>
        <td>{{ position.display_order }}</td>
        <td>{{ position.name }}</td>
        <td class="actions">
          <a class="btn btn-small" href="{{ url_for('admin.position_edit', position_id=position.id) }}">Edit</a>
          <form method="post" action="{{ url_for('admin.position_delete', position_id=position.id) }}" onsubmit="return confirm('Delete this position?')">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button class="btn btn-small btn-danger" type="submit">Delete</button>
          </form>
        </td>
      </tr>
    {% else %}
      <tr><td colspan="3">No positions yet.</td></tr>
    {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
